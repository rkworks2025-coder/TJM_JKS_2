<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JKS-II">
<title>JKS-II</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</head>
<body>

<header>
  <div class="header-title">JKS-II</div>
  <div class="area-tabs">
    <button class="area-tab active" data-area="yamato" onclick="switchArea('yamato')">大和</button>
    <button class="area-tab" data-area="ebina" onclick="switchArea('ebina')">海老名</button>
    <button class="area-tab" data-area="nakahara" onclick="switchArea('nakahara')">中原</button>
  </div>
  <button id="updateBtn" class="update-btn" onclick="triggerUpdate()">更新</button>
  <button id="scanBtn" class="scan-btn" onclick="triggerScan()">スキャン</button>
</header>

<div class="main" id="mainArea">
  <div class="grid-transform" id="gridTransform">
    <div class="hex-grid" id="hexGrid"></div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loading-text">LOADING...</div>
  <div class="loading-sub">データを取得中</div>
</div>

<div class="minimap" id="minimap">
  <canvas id="minimapCanvas"></canvas>
  <div class="minimap-viewport" id="minimapViewport"></div>
  <svg class="minimap-move-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
    <circle cx="8" cy="8" r="7.5" fill="none" stroke="white" stroke-width="1"/>
    <!-- 上矢印 -->
    <polygon points="8,2 6,5 10,5" fill="white"/>
    <!-- 下矢印 -->
    <polygon points="8,14 6,11 10,11" fill="white"/>
    <!-- 左矢印 -->
    <polygon points="2,8 5,6 5,10" fill="white"/>
    <!-- 右矢印 -->
    <polygon points="14,8 11,6 11,10" fill="white"/>
  </svg>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-handle"></div>
  <button class="detail-nav" id="navBtn" onclick="openNav()">▶ ナビ</button>
  <div class="detail-station" id="detailStation">—</div>
  <div class="detail-cd" id="detailCd">—</div>
  <div class="detail-vehicles" id="detailVehicles"></div>
</div>

<script src="app.js?v=3"></script>
</body>
</html>
